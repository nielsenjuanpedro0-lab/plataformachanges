<ion-content style="--background: #F8FAFC;">
    <div class="page-container" style="padding: 40px; max-width: 1200px; margin: 0 auto;">

        <app-header title="Productores (PAS)" subtitle="Gestión de matrícula y datos legales"></app-header>

        <div style="display: flex; gap: 16px; margin: 32px 0; align-items: center;">
            <div
                style="flex: 1; background: #fff; border: 1px solid #E2E8F0; border-radius: 12px; height: 50px; display: flex; align-items: center; padding: 0 16px;">
                <ion-icon name="search-outline" style="color: #94A3B8; margin-right: 12px;"></ion-icon>
                <input type="text" [(ngModel)]="searchTerm" (keyup)="applyFilters()"
                    placeholder="Buscar por nombre, matrícula o CUIT..."
                    style="border: none; outline: none; width: 100%; color: #061121; font-size: 1rem; background: transparent;">
            </div>
            <button (click)="nuevoPas()"
                style="background: #061121; color: white; border-radius: 12px; padding: 0 24px; height: 50px; border: none; font-weight: 700; cursor: pointer;">
                Nuevo PAS
            </button>
        </div>

        <div style="display: grid; grid-template-columns: repeat(auto-fill, minmax(350px, 1fr)); gap: 24px;">
            <div *ngFor="let pas of filteredPasList"
                style="background: #fff; padding: 20px; border-radius: 16px; border: 1px solid #E2E8F0;">
                <div
                    style="display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 15px;">
                    <div>
                        <h3 style="margin: 0; color: #061121; font-weight: 800; font-size: 1.1rem;">{{
                            pas.nombre_o_razon_social }}</h3>
                        <code style="color: #64748B; font-size: 0.8rem;">MAT: {{ pas.matricula }}</code>
                    </div>
                    <div style="display: flex; gap: 8px;">
                        <ion-button fill="clear" (click)="editarPas(pas)" style="--color: #94A3B8;"><ion-icon
                                name="create-outline"></ion-icon></ion-button>
                        <ion-button fill="clear" (click)="abrirEliminar(pas)" style="--color: #EF4444;"><ion-icon
                                name="trash-outline"></ion-icon></ion-button>
                    </div>
                </div>
                <div
                    style="border-top: 1px solid #F1F5F9; padding-top: 12px; display: flex; flex-direction: column; gap: 8px;">
                    <div style="display: flex; align-items: center; gap: 8px; color: #475569; font-size: 0.9rem;">
                        <ion-icon name="mail-outline"></ion-icon> {{ pas.email_contacto }}
                    </div>
                    <div style="display: flex; align-items: center; gap: 8px; color: #475569; font-size: 0.9rem;">
                        <ion-icon name="location-outline"></ion-icon> {{ pas.domicilio }}
                    </div>
                </div>
            </div>
        </div>
    </div>

    <ion-modal [isOpen]="isModalOpen" (didDismiss)="cerrarModal()"
        style="--width: 600px; --height: 650px; --border-radius: 24px;">
        <ng-template>
            <div style="display: flex; flex-direction: column; height: 100%; background: #ffffff !important;">

                <div
                    style="padding: 30px 32px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #F1F5F9;">
                    <h2 style="margin: 0; font-weight: 900; font-size: 1.6rem; color: #061121 !important;">{{ editingId
                        ? 'Editar' : 'Nuevo' }} Productor</h2>
                    <button (click)="cerrarModal()"
                        style="background: #F3F4F6; border: none; border-radius: 50%; width: 36px; height: 36px; color: #64748B; cursor: pointer;">
                        <ion-icon name="close-outline" style="font-size: 1.5rem;"></ion-icon>
                    </button>
                </div>

                <div style="flex: 1; overflow-y: auto; padding: 24px 32px;">
                    <form [formGroup]="pasForm" style="display: flex; flex-direction: column; gap: 20px;">

                        <div>
                            <label
                                style="display: block; color: #64748B; font-weight: 800; font-size: 0.75rem; margin-bottom: 8px;">NOMBRE
                                O RAZÓN SOCIAL</label>
                            <input type="text" formControlName="nombre_o_razon_social" placeholder="Ej. Juan Pérez"
                                style="width: 100%; padding: 14px; border-radius: 12px; border: 1px solid #E2E8F0; background: #F8FAFC; color: #000 !important; font-weight: 600; outline: none;">
                        </div>

                        <div style="display: flex; gap: 16px;">
                            <div style="flex: 1;">
                                <label
                                    style="display: block; color: #64748B; font-weight: 800; font-size: 0.75rem; margin-bottom: 8px;">CUIT</label>
                                <input type="text" formControlName="cuit" placeholder="20-XXXXXXXX-X"
                                    style="width: 100%; padding: 14px; border-radius: 12px; border: 1px solid #E2E8F0; background: #F8FAFC; color: #000 !important; font-weight: 600; outline: none;">
                            </div>
                            <div style="flex: 1;">
                                <label
                                    style="display: block; color: #64748B; font-weight: 800; font-size: 0.75rem; margin-bottom: 8px;">MATRÍCULA</label>
                                <input type="text" formControlName="matricula" placeholder="Ej. 78544"
                                    style="width: 100%; padding: 14px; border-radius: 12px; border: 1px solid #E2E8F0; background: #F8FAFC; color: #000 !important; font-weight: 600; outline: none;">
                            </div>
                        </div>

                        <div style="display: flex; gap: 16px;">
                            <div style="flex: 1;">
                                <label
                                    style="display: block; color: #64748B; font-weight: 800; font-size: 0.75rem; margin-bottom: 8px;">EMAIL</label>
                                <input type="email" formControlName="email_contacto" placeholder="correo@ejemplo.com"
                                    style="width: 100%; padding: 14px; border-radius: 12px; border: 1px solid #E2E8F0; background: #F8FAFC; color: #000 !important; font-weight: 600; outline: none;">
                            </div>
                            <div style="flex: 1;">
                                <label
                                    style="display: block; color: #64748B; font-weight: 800; font-size: 0.75rem; margin-bottom: 8px;">TELÉFONO</label>
                                <input type="text" formControlName="telefono_contacto" placeholder="011 4444-5555"
                                    style="width: 100%; padding: 14px; border-radius: 12px; border: 1px solid #E2E8F0; background: #F8FAFC; color: #000 !important; font-weight: 600; outline: none;">
                            </div>
                        </div>

                        <div>
                            <label
                                style="display: block; color: #64748B; font-weight: 800; font-size: 0.75rem; margin-bottom: 8px;">DOMICILIO</label>
                            <input type="text" formControlName="domicilio" placeholder="Calle, Ciudad, Provincia"
                                style="width: 100%; padding: 14px; border-radius: 12px; border: 1px solid #E2E8F0; background: #F8FAFC; color: #000 !important; font-weight: 600; outline: none;">
                        </div>

                        <div>
                            <label
                                style="display: block; color: #64748B; font-weight: 800; font-size: 0.75rem; margin-bottom: 8px;">ORGANIZADOR
                                ASIGNADO</label>
                            <div style="position: relative;">
                                <select formControlName="organizador_id"
                                    style="width: 100%; padding: 14px; border-radius: 12px; border: 1px solid #E2E8F0; background: #F8FAFC; color: #000; font-weight: 600; appearance: none; outline: none;">
                                    <option [ngValue]="null">Venta Directa</option>
                                    <option *ngFor="let org of organizadores" [value]="org.id">{{ org.nombre }}</option>
                                </select>
                                <ion-icon name="chevron-down-outline"
                                    style="position: absolute; right: 16px; top: 50%; transform: translateY(-50%); color: #64748B; pointer-events: none;"></ion-icon>
                            </div>
                        </div>
                    </form>
                </div>

                <div style="padding: 24px 32px 32px 32px; border-top: 1px solid #F1F5F9; background: #fff;">
                    <button (click)="guardarPas()" [disabled]="pasForm.invalid"
                        style="width: 100%; background: #061121; color: white; padding: 16px; border-radius: 14px; border: none; font-weight: 700; font-size: 1.1rem; cursor: pointer; margin-bottom: 12px; opacity: pasForm.invalid ? 0.5 : 1;">
                        {{ editingId ? 'Guardar Cambios' : 'Confirmar Alta' }}
                    </button>
                    <button (click)="cerrarModal()"
                        style="width: 100%; background: transparent; color: #64748B; border: none; font-weight: 700; cursor: pointer;">
                        Cancelar
                    </button>
                </div>

            </div>
        </ng-template>
    </ion-modal>
</ion-content>
